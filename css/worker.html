<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ваниль — Панель работника</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css"><link rel="stylesheet" href="css/themes.css">
</head>
<body class="min-h-screen" data-role="worker">
  <nav class="nav"><div class="container flex justify-between items-center py-3">
    <a onclick="logout()" class="text-muted hover:text-accent transition">← Выйти</a>
    <span class="font-serif font-medium">💬 Заказы</span>
    <select id="filter" class="px-3 py-1 rounded-lg bg-stone-800 border border-stone-700 text-sm"><option value="all">Все</option><option value="pending">🟡 Новые</option><option value="ready">🟢 Готовые</option><option value="delivered">🔵 Доставленные</option></select>
  </div></nav>
  <main class="container py-6 max-w-4xl mx-auto">
    <div id="stats" class="flex gap-4 text-sm mb-4 text-muted"><span>🟡 <b id="p">0</b></span><span>🟢 <b id="r">0</b></span><span>🔵 <b id="d">0</b></span></div>
    <div class="card rounded-2xl overflow-hidden">
      <div class="p-4 border-b border-stone-700 flex justify-between"><h2 class="font-serif text-lg">Входящие</h2><span id="count" class="text-sm text-muted">0</span></div>
      <div id="list" class="p-4 max-h-[70vh] overflow-y-auto space-y-3"></div>
    </div>
  </main>
  <div id="toast" class="toast fixed top-4 right-4 card border-l-4 border-emerald-500"><span class="text-xl">🌸</span><div><div class="font-medium text-sm">Новый заказ!</div><div id="tText" class="text-xs text-muted"></div></div></div>
  <script type="module">
    import { requireRole, logout } from './js/auth.js';
    import { subscribe, updateStatus, STATUS, STATUS_LABELS, fmtPrice, fmtDate, badge } from './js/orders.js';
    if(!requireRole('worker')) throw 'redirect';
    let filter='all'; document.getElementById('filter').onchange = e => { filter=e.target.value; render(); };
    let unsub;
    function render() { unsub?.(); unsub = subscribe(orders => {
      const list = filter==='all'?orders:orders.filter(o=>o.status===filter);
      document.getElementById('count').textContent = `${list.length} заказов`;
      document.getElementById('p').textContent = orders.filter(o=>o.status===STATUS.PENDING).length;
      document.getElementById('r').textContent = orders.filter(o=>o.status===STATUS.READY).length;
      document.getElementById('d').textContent = orders.filter(o=>o.status===STATUS.DELIVERED).length;
      document.getElementById('list').innerHTML = list.length ? list.map(o => `
        <div class="card rounded-xl p-4" data-id="${o.id}">
          <div class="flex justify-between mb-2"><span class="font-medium">${o.customer.name}</span>${badge(o.status)}</div>
          <div class="text-sm mb-2 text-muted">${o.customer.phone}</div>
          <div class="text-sm mb-3 p-2 bg-stone-700/50 rounded">${o.comment||'Без комментария'}</div>
          <div class="flex justify-between text-xs text-muted mb-3"><span>💰 ${fmtPrice(o.total)}</span><span>🕐 ${fmtDate(o.createdAt)}</span></div>
          <div class="flex gap-2">
            ${o.status===STATUS.PENDING?`<button onclick="upd('${o.id}','${STATUS.READY}')" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg text-sm">✓ Готов</button>`:''}
            ${o.status===STATUS.READY?`<button onclick="upd('${o.id}','${STATUS.DELIVERED}')" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm">🚚 Доставлен</button>`:''}
            ${o.status===STATUS.DELIVERED?'<span class="text-green-400 text-sm">✓ Завершён</span>':''}
          </div>
        </div>`).join('') : '<p class="text-muted text-center py-8">Заказов нет</p>';
      if(list.some(o=>!seen.has(o.id)&&o.status===STATUS.PENDING)){ document.getElementById('tText').textContent=`${list[0].customer.name}: ${fmtPrice(list[0].total)}`; const t=document.getElementById('toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),5000); list.forEach(o=>seen.add(o.id)); }
    }); }
    let seen=new Set(); window.upd = async(id,s) => { if(confirm(`Статус → "${STATUS_LABELS[s]}"?`)){ try{ await updateStatus(id,s); }catch(e){alert(e)} } };
    window.logout = logout; window.addEventListener('beforeunload', ()=>unsub?.()); render();
  </script>
</body>
</html>
