<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ваниль — Мои заказы</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css"><link rel="stylesheet" href="css/themes.css">
</head>
<body class="min-h-screen" data-role="user">
  <nav class="nav"><div class="container flex justify-between items-center py-3">
    <a onclick="logout()" class="text-muted hover:text-accent transition">← Выйти</a>
    <span class="font-serif font-medium">Мои заказы</span>
  </div></nav>
  <main class="container py-6 max-w-3xl mx-auto">
    <section class="card rounded-2xl p-6 mb-6">
      <h2 class="font-serif text-xl mb-4">🌸 Создать заказ</h2>
      <form id="form" class="space-y-4">
        <input type="text" id="name" required placeholder="Имя *" class="w-full px-4 py-2 rounded-lg">
        <input type="tel" id="phone" required placeholder="Телефон *" class="w-full px-4 py-2 rounded-lg">
        <select id="type" class="w-full px-4 py-2 rounded-lg"><option value="bouquet">🌷 Букет</option><option value="interior">🏢 Интерьер</option></select>
        <textarea id="comment" rows="3" placeholder="Пожелания..." class="w-full px-4 py-2 rounded-lg resize-none"></textarea>
        <input type="number" id="total" value="2000" min="100" class="w-full px-4 py-2 rounded-lg" placeholder="Сумма ₽">
        <button type="submit" class="w-full btn py-3 rounded-xl font-medium">Оформить</button>
      </form>
    </section>
    <div id="list" class="space-y-3"></div>
  </main>
  <div id="toast" class="toast card"><div class="flex gap-3"><span id="tIcon" class="text-xl"></span><div><div id="tTitle" class="font-medium text-sm"></div><div id="tText" class="text-xs text-muted"></div></div></div></div>
  <script type="module">
    import { requireRole, logout } from './js/auth.js';
    import { create, subscribe, fmtPrice, fmtDate, badge, STATUS_LABELS } from './js/orders.js';
    if(!requireRole('user')) throw 'redirect';
    const unsub = subscribe(orders => {
      document.getElementById('list').innerHTML = orders.length ? orders.map(o => `
        <div class="card rounded-xl p-4" data-id="${o.id}">
          <div class="flex justify-between mb-2"><span class="font-medium">${o.type==='bouquet'?'🌷 Букет':'🏢 Интерьер'}</span>${badge(o.status)}</div>
          ${o.comment?`<div class="text-sm mb-2 p-2 bg-stone-50 rounded">${o.comment}</div>`:''}
          <div class="flex justify-between text-sm"><span>${fmtPrice(o.total)}</span><span class="text-muted">${fmtDate(o.createdAt)}</span></div>
        </div>`).join('') : '<p class="text-muted text-center py-8">Заказов пока нет</p>';
      orders.forEach(o => { if(last[o.id] && last[o.id]!==o.status) toast(`Статус: ${STATUS_LABELS[o.status]}`,'',o.status==='delivered'?'🚚':'✓'); last[o.id]=o.status; });
    });
    let last={};
    document.getElementById('form').onsubmit = async e => { e.preventDefault(); await create({customer:{name:document.getElementById('name').value,phone:document.getElementById('phone').value},type:document.getElementById('type').value,comment:document.getElementById('comment').value,total:+document.getElementById('total').value}); e.target.reset(); toast('✓ Заказ принят!','Мы уже начали работу','✅'); };
    function toast(t,txt,ic){ const el=document.getElementById('toast'); document.getElementById('tTitle').textContent=t; document.getElementById('tText').textContent=txt; document.getElementById('tIcon').textContent=ic; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3000); }
    window.logout = logout; window.addEventListener('beforeunload', unsub);
  </script>
</body>
</html>
