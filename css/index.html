<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ваниль — Вход</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css"><link rel="stylesheet" href="css/themes.css">
</head>
<body class="min-h-screen flex-center p-4 bg-stone-50">
  <div class="card rounded-2xl p-8 max-w-md w-full text-center shadow-lg">
    <h1 class="font-serif text-2xl font-semibold mb-2">Студия «Ваниль»</h1>
    <p class="text-muted mb-6">Выберите роль для демо</p>
    <div class="space-y-3">
      <button onclick="login('user')" class="w-full py-3 px-4 rounded-xl border border-stone-200 hover:border-rose-500 transition flex items-center justify-center gap-3">
        👤 Пользователь <span class="ml-auto text-xs text-muted">Светлая</span>
      </button>
      <button onclick="login('worker')" class="w-full py-3 px-4 rounded-xl border border-stone-200 hover:border-emerald-500 transition flex items-center justify-center gap-3">
        👨‍💼 Работник <span class="ml-auto text-xs text-muted">Тёмная</span>
      </button>
      <button onclick="login('dev')" class="w-full py-3 px-4 rounded-xl border border-stone-200 hover:border-blue-500 transition flex items-center justify-center gap-3">
        👨‍💻 Разработчик <span class="ml-auto text-xs text-muted">Синяя</span>
      </button>
    </div>
    <p class="text-xs text-muted mt-6 pt-4 border-t border-stone-100">💡 Данные хранятся в браузере. Синхронизация между устройствами появится позже.</p>
  </div>
  <script type="module">
    import { setRole } from './js/auth.js';
    window.login = setRole;
    if(localStorage.getItem('vanilla_role')) window.location.href = {user:'user.html',worker:'worker.html',dev:'dev.html'}[localStorage.getItem('vanilla_role')] || 'index.html';
  </script>
</body>
</html>
